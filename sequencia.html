<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Ordem Crescente</title>
    <!-- Inclui a biblioteca Tailwind CSS para um estilo limpo e responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Define a fonte Inter para o projeto */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8; /* Cor de fundo suave */
        }
        /* Estilo para a animação de virar o card */
        .card-flip-container {
            perspective: 1000px;
        }
        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card-flip {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .card-back {
            transform: rotateY(180deg);
        }
        /* Estilo para a mensagem personalizada */
        .message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            text-align: center;
        }
        .message-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <!-- Conteúdo principal do jogo -->
    <div class="bg-white p-6 md:p-10 rounded-xl shadow-2xl max-w-lg w-full text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-4">Jogo da Memória Numérica</h1>
        <p id="game-message" class="text-gray-600 text-lg mb-6">Clique em "Iniciar Jogo" para começar!</p>

        <!-- Container do grid de cartas -->
        <div id="game-board" class="grid grid-cols-3 gap-4 mb-6">
            <!-- As cartas serão geradas aqui pelo JavaScript -->
        </div>

        <!-- Botão para iniciar o jogo -->
        <button id="start-button" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors duration-300">
            Iniciar Jogo
        </button>

    </div>

    <!-- Container da mensagem personalizada -->
    <div id="message-container" class="hidden">
        <div class="message-backdrop"></div>
        <div class="message-box">
            <p id="message-text" class="text-gray-800 text-lg mb-4"></p>
            <button id="message-button" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-colors duration-300">
                OK
            </button>
        </div>
    </div>

    <script>
        // Variáveis globais para o estado do jogo
        const gameBoard = document.getElementById('game-board');
        const startButton = document.getElementById('start-button');
        const gameMessage = document.getElementById('game-message');
        const messageContainer = document.getElementById('message-container');
        const messageText = document.getElementById('message-text');
        const messageButton = document.getElementById('message-button');

        let numbers = [];
        let shuffledNumbers = [];
        let currentGuess = 1;
        let isGameActive = false;
        let isRevealing = false;

        // Função para mostrar uma mensagem personalizada
        function showMessage(text, buttonText = "OK") {
            messageText.textContent = text;
            messageButton.textContent = buttonText;
            messageContainer.classList.remove('hidden');
            return new Promise(resolve => {
                messageButton.onclick = () => {
                    messageContainer.classList.add('hidden');
                    resolve();
                };
            });
        }

        // Função para embaralhar um array (algoritmo Fisher-Yates)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [
                    array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Função para criar o tabuleiro do jogo
        function createBoard() {
            gameBoard.innerHTML = ''; // Limpa o tabuleiro
            shuffledNumbers = shuffle([...numbers]); // Cria uma cópia embaralhada
            
            shuffledNumbers.forEach((number, index) => {
                const cardContainer = document.createElement('div');
                cardContainer.classList.add('card-flip-container');

                const cardInner = document.createElement('div');
                cardInner.classList.add('card-inner', 'w-24', 'h-24', 'sm:w-28', 'sm:h-28', 'md:w-32', 'md:h-32');
                cardInner.dataset.number = number;
                cardInner.dataset.index = index;

                // Frente da carta (número)
                const cardFront = document.createElement('div');
                cardFront.classList.add('card-front', 'flex', 'items-center', 'justify-center', 'text-4xl', 'md:text-5xl', 'font-bold', 'bg-blue-200', 'text-blue-800', 'rounded-lg', 'shadow-md', 'border-4', 'border-blue-400', 'transition-all', 'duration-300', 'hover:scale-105');
                cardFront.textContent = number;

                // Verso da carta (ícone de pergunta)
                const cardBack = document.createElement('div');
                cardBack.classList.add('card-back', 'flex', 'items-center', 'justify-center', 'bg-gray-300', 'text-gray-700', 'rounded-lg', 'shadow-md', 'border-4', 'border-gray-500', 'cursor-pointer', 'transition-all', 'duration-300', 'hover:scale-105');
                cardBack.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c0-3.111 2.529-5.64 5.64-5.64a5.64 5.64 0 015.64 5.64c0 3.111-2.529 5.64-5.64 5.64a5.64 5.64 0 01-5.64-5.64zm0 0a3.111 3.111 0 01-3.111-3.111M2.75 12a9.25 9.25 0 1118.5 0 9.25 9.25 0 01-18.5 0z" />
                                      </svg>`;
                
                cardInner.appendChild(cardFront);
                cardInner.appendChild(cardBack);
                cardContainer.appendChild(cardInner);
                gameBoard.appendChild(cardContainer);
            });
        }

        // Função para virar todas as cartas para cima ou para baixo
        function flipCards(faceUp = true) {
            const cards = document.querySelectorAll('.card-inner');
            cards.forEach(card => {
                if (faceUp) {
                    card.classList.remove('card-flip');
                } else {
                    card.classList.add('card-flip');
                }
            });
        }

        // Função para gerenciar o clique do jogador
        function checkGuess(event) {
            if (!isGameActive || isRevealing) return;

            // Encontra o elemento .card-inner clicado
            const clickedCardInner = event.target.closest('.card-inner');
            if (!clickedCardInner) return;

            const guessedNumber = parseInt(clickedCardInner.dataset.number);
            const cardIndex = parseInt(clickedCardInner.dataset.index);

            // Se a carta já estiver virada, não faz nada
            if (!clickedCardInner.classList.contains('card-flip')) return;

            if (guessedNumber === currentGuess) {
                // Acertou
                clickedCardInner.classList.remove('card-flip');
                gameMessage.textContent = `Você acertou! Próximo número é ${currentGuess + 1}.`;
                currentGuess++;

                if (currentGuess > 9) {
                    isGameActive = false;
                    setTimeout(() => {
                        showMessage("Parabéns, você venceu! 🎉", "Jogar de Novo").then(startGame);
                    }, 500);
                }
            } else {
                // Errou
                isGameActive = false;
                clickedCardInner.classList.remove('card-flip');
                gameMessage.textContent = `Ops! Você errou. O próximo número era ${currentGuess}.`;
                setTimeout(() => {
                    showMessage("Você perdeu! 😔", "Tentar Novamente").then(() => {
                        flipCards(false); // Vira a carta errada para baixo
                        startGame();
                    });
                }, 500);
            }
        }

        // Função principal que inicia o jogo
        async function startGame() {
            isGameActive = false;
            isRevealing = true;
            startButton.disabled = true;
            gameMessage.textContent = 'Embaralhando os números...';
            currentGuess = 1;

            // Cria um array de 1 a 9
            numbers = Array.from({length: 9}, (_, i) => i + 1);
            createBoard();

            // Mensagem e revelação
            gameMessage.textContent = 'Memorize a ordem dos números. Você tem 7 segundos!';
            flipCards(true); // Vira todas as cartas para cima

            // Aguarda 7 segundos
            await new Promise(resolve => setTimeout(resolve, 7000));
            
            isRevealing = false;
            gameMessage.textContent = 'Tempo esgotado! Agora, clique nas cartas em ordem crescente.';
            flipCards(false); // Vira todas as cartas para baixo
            isGameActive = true;
            startButton.disabled = false;
        }

        // Adiciona os event listeners
        startButton.addEventListener('click', startGame);
        gameBoard.addEventListener('click', checkGuess);

        // Inicializa o jogo ao carregar a página
        window.onload = () => {
             // Inicia o jogo, mas deixa o botão para o usuário clicar
             gameMessage.textContent = 'Clique em "Iniciar Jogo" para começar!';
        };

    </script>
</body>
</html>
